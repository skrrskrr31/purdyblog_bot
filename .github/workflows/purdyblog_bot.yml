name: Purdyblog Bot

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Türkiye - sabah
    - cron: '0 9 * * *'   # 12:00 Türkiye - öğle
    - cron: '0 12 * * *'  # 15:00 Türkiye - öğleden sonra
    - cron: '0 15 * * *'  # 18:00 Türkiye - akşam
    - cron: '0 18 * * *'  # 21:00 Türkiye - ana yayın saati
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python kurulum
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Paketleri kur
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TOKEN_JSON:   ${{ secrets.TOKEN_JSON }}
          SECRET_JSON:  ${{ secrets.SECRET_JSON }}
        run: python purdyblog_bot.py

      - name: Kullanılan haberleri kaydet
        run: |
          git config user.name "purdyblog-bot"
          git config user.email "bot@purdyblog.com"
          git add kullanilan_haberler.json || true
          git diff --staged --quiet || git commit -m "update: kullanilan haberler guncellendi"
          git push || true
