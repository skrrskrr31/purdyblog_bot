name: Purdyblog Bot

on:
  schedule:
    - cron: '0 9 * * *'   # 12:00 Türkiye
    - cron: '0 14 * * *'  # 17:00 Türkiye
    - cron: '0 19 * * *'  # 22:00 Türkiye
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Python kurulum
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Paketleri kur
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TOKEN_JSON:          ${{ secrets.TOKEN_JSON }}
          SECRET_JSON:         ${{ secrets.SECRET_JSON }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python purdyblog_bot.py

      - name: Kullanılan haberleri kaydet
        run: |
          git config user.name "purdyblog-bot"
          git config user.email "bot@purdyblog.com"
          git add kullanilan_haberler.json || true
          git diff --staged --quiet || git commit -m "update: kullanilan haberler guncellendi"
          git push || true
